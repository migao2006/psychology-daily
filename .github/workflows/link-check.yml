name: Link check
on:
  schedule:
    - cron: "30 22 * * 0"
  workflow_dispatch:
  pull_request:
    paths:
      - "content/**"
      - "README.md"
permissions:
  contents: read
concurrency:
  group: links-${{ github.ref }}
  cancel-in-progress: true
jobs:
  links:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          args: >-
            --no-progress
            --max-retries 3
            --retry-wait-time 2
            --timeout 20
            --accept 200,204,206,301,302,303,307,308,403,429
            README.md docs/**/*.md content/**/*.json
          fail: true
